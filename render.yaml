services:
  - type: web
    name: resumeparser-gemma
    runtime: python
    buildCommand: pip install -r requirements.txt
    # One process + threads (gthread): avoids a multi-process SQLite WAL init
    # race while keeping /health responsive during a 2-4 min parse. --timeout
    # 600 because Gemma 4 (free tier) is slow per resume.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 600
    envVars:
      # Gemma 4 via Google AI Studio. Get a free key at aistudio.google.com/apikey
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_MODEL
        value: gemma-4-31b-it
      - key: GOOGLE_TIMEOUT
        value: "300"
      # Auto-retry transient free-tier 500s/timeouts so live requests survive.
      - key: LLM_MAX_RETRIES
        value: "4"
    healthCheckPath: /health
